  SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhyd3Z3ZGNjemdpd2F1ZHh4dHBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDMzNjgsImV4cCI6MjA5NDg3OTM2OH0.TFkrPSfI1IO5VFxRt4XSOIKAyccY7HQbdVSCbQoWvhQ

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.ngpropertyhub.app",
            "appName": "NGPropertyHub",
            "webDir": "dist/client",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Android project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NGPropertyHub-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
